<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debatt-Bingo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .bingo-container {
            width: 300px;
            margin: 50px auto;
            text-align: center;
        }
        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .bingo-cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
        }
        .bingo-cell.selected {
            background-color: #a0e0a0;
        }
        #reset-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #reset-button:hover {
            background-color: #0056b3;
        }
        .reset-icon {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="bingo-container">
        <h1>Debatt-Bingo</h1>
        <div class="bingo-card">
            <div class="bingo-cell">A</div>
            <div class="bingo-cell">B</div>
            <div class="bingo-cell">C</div>
            <div class="bingo-cell">D</div>
            <div class="bingo-cell">E</div>
            <div class="bingo-cell">F</div>
            <div class="bingo-cell">G</div>
            <div class="bingo-cell">H</div>
            <div class="bingo-cell">I</div>
            <div class="bingo-cell">J</div>
            <div class="bingo-cell">K</div>
            <div class="bingo-cell">L</div>
            <div class="bingo-cell">M</div>
            <div class="bingo-cell">N</div>
            <div class="bingo-cell">O</div>
            <div class="bingo-cell">P</div>
            <div class="bingo-cell">Q</div>
            <div class="bingo-cell">R</div>
            <div class="bingo-cell">S</div>
            <div class="bingo-cell">T</div>
            <div class="bingo-cell">U</div>
            <div class="bingo-cell">V</div>
            <div class="bingo-cell">W</div>
            <div class="bingo-cell">X</div>
            <div class="bingo-cell">Y</div>
            <div class="bingo-cell">Z</div>
        </div>
        <button id="reset-button"><span class="reset-icon">🔄</span>Reset Bingo</button>
    </div>
    <script>
        const cells = document.querySelectorAll('.bingo-cell');
        const resetButton = document.getElementById('reset-button');

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                cell.classList.toggle('selected');
            });
        });

        resetButton.addEventListener('click', () => {
            cells.forEach(cell => {
                cell.classList.remove('selected');
            });
        });
    </script>
</body>
</html>
